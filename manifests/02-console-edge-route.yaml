apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: amq-broker-console-edge
  namespace: amq
  labels:
    app: amq-broker-console
spec:
  to:
    kind: Service
    name: amq-broker-wconsj-0-svc
    weight: 100
  port:
    targetPort: wconsj-0
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
